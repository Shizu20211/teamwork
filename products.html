<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>products</title>
    <link rel="stylesheet" href="./css/products.css">

</head>

<body>
    <!-- 體驗探索主區塊容器 -->
    <div class="it-explore-container">
        <!-- 側邊/上方 篩選條件區 -->
        <aside class="it-filter-sidebar">
            <div class="it-filter-header">
                <h2 class="it-filter-title">篩選條件</h2>
                <button type="button" id="it-clear-all" class="it-btn-clear">清除全部</button>
            </div>

            <!-- 地區篩選 -->
            <div class="it-filter-group">
                <h3 class="it-filter-group-title">地區</h3>
                <div class="it-filter-tags" id="it-filter-region">
                    <button type="button" class="it-tag-btn" data-value="台北">台北</button>
                    <button type="button" class="it-tag-btn" data-value="新北">新北</button>
                    <button type="button" class="it-tag-btn" data-value="台中">台中</button>
                    <button type="button" class="it-tag-btn" data-value="台南">台南</button>
                    <button type="button" class="it-tag-btn" data-value="高雄">高雄</button>
                    <button type="button" class="it-tag-btn" data-value="宜蘭">宜蘭</button>
                    <button type="button" class="it-tag-btn" data-value="花蓮">花蓮</button>
                    <button type="button" class="it-tag-btn" data-value="嘉義">嘉義</button>
                    <button type="button" class="it-tag-btn" data-value="屏東">屏東</button>
                    <button type="button" class="it-tag-btn" data-value="彰化">彰化</button>
                </div>
            </div>

            <!-- 主題分類篩選 -->
            <div class="it-filter-group">
                <h3 class="it-filter-group-title">主題分類</h3>
                <div class="it-filter-tags" id="it-filter-category">
                    <button type="button" class="it-tag-btn" data-value="戶外冒險">🏔 戶外</button>
                    <button type="button" class="it-tag-btn" data-value="手作工藝">🎨 手作</button>
                    <button type="button" class="it-tag-btn" data-value="美食料理">🍜 美食</button>
                    <button type="button" class="it-tag-btn" data-value="文化歷史">🏛 文化</button>
                </div>
            </div>

            <!-- 時間篩選 -->
            <div class="it-filter-group">
                <h3 class="it-filter-group-title">時間</h3>
                <div class="it-filter-tags" id="it-filter-duration">
                    <button type="button" class="it-tag-btn" data-value="2小時">2小時</button>
                    <button type="button" class="it-tag-btn" data-value="3小時">3小時</button>
                    <button type="button" class="it-tag-btn" data-value="4小時">4小時</button>
                    <button type="button" class="it-tag-btn" data-value="半天">半天</button>
                    <button type="button" class="it-tag-btn" data-value="全天">全天</button>
                </div>
            </div>

            <!-- 價格區間篩選 -->
            <div class="it-filter-group">
                <h3 class="it-filter-group-title">價格區間（NT$）</h3>
                <div class="it-price-range-inputs">
                    <input type="number" id="it-price-min" placeholder="最低" min="0">
                    <span class="it-price-separator">—</span>
                    <input type="number" id="it-price-max" placeholder="最高" min="0">
                </div>
            </div>
        </aside>

        <!-- 右側/下方 商品列表與排序區 -->
        <main class="it-products-main">
            <!-- 麵包屑與排序工具列 -->
            <div class="it-products-toolbar">
                <div class="it-breadcrumb">
                    <a href="#">首頁</a> › <span class="it-current-page">探索體驗</span>
                    <span class="it-products-count" id="it-total-count">共找到 12 個體驗</span>
                </div>

                <!-- 排序下拉選單 -->
                <div class="it-sort-wrapper">
                    <select id="it-sort-select" class="it-select">
                        <option value="default">預設排序</option>
                        <option value="price-asc">價格由低到高</option>
                        <option value="price-desc">價格由高到低</option>
                        <option value="rating-desc">評分最高</option>
                        <option value="reviews-desc">最多評論</option>
                    </select>
                </div>
            </div>

            <!-- 產品卡片容器 (由 JavaScript 動態渲染) -->
            <div class="it-products-grid" id="it-products-grid">
                <!-- 卡片結構將由 JS 自動生成插入 -->
            </div>
        </main>
    </div>
    <script>


        // 模擬來自後端的 12 筆基礎資料 (可提供給團隊對接 API 使用)
        const SAMPLE_PRODUCTS = [
            { id: 1, title: "清水斷崖獨木舟探險", region: "花蓮", category: "戶外冒險", duration: "半天", price: 1800, rating: 4.5, reviews: 312, img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" },
            { id: 2, title: "九份老街手捏陶藝體驗", region: "新北", category: "手作工藝", duration: "3小時", price: 980, rating: 4.5, reviews: 205, img: "https://petit-tw.jp/wp-content/uploads/2019/03/DSC02161-940x627.jpg" },
            { id: 3, title: "台中市場私廚料理課", region: "台中", category: "美食料理", duration: "4小時", price: 1500, rating: 4.5, reviews: 189, img: "https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=500" },
            { id: 4, title: "阿里山日出觀星嚮導", region: "嘉義", category: "自然探索", duration: "全天", price: 2200, rating: 5.0, reviews: 98, img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500" },
            { id: 5, title: "淡水老街藍染拼布工作坊", region: "新北", category: "手作工藝", duration: "3小時", price: 1200, rating: 4.5, reviews: 147, img: "https://images.unsplash.com/photo-1528164344705-47542687000d?w=500" },
            { id: 6, title: "台南府城古蹟深度導覽", region: "台南", category: "文化歷史", duration: "半天", price: 800, rating: 4.5, reviews: 261, img: "https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?w=500" },
            { id: 7, title: "宜蘭稻田生態農遊體驗", region: "宜蘭", category: "自然探索", duration: "半天", price: 1100, rating: 4.5, reviews: 173, img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500" },
            { id: 8, title: "高雄旗津老漁村料理日", region: "高雄", category: "美食料理", duration: "4小時", price: 1350, rating: 4.5, reviews: 142, img: "https://petit-tw.jp/wp-content/uploads/2019/03/DSC06114.jpg" },
            { id: 9, title: "太魯閣峽谷健行之旅", region: "花蓮", category: "戶外冒險", duration: "全天", price: 2500, rating: 4.5, reviews: 287, img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" },
            { id: 10, title: "彰化扇形車庫鐵道文化探索", region: "彰化", category: "文化歷史", duration: "2小時", price: 700, rating: 4.5, reviews: 118, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKPHnYWa3rltHpmvwwD6yWlzAm_f54sq1BACCx6xSqNytc9_9e5qnpkCE&s=10" },
            { id: 11, title: "墾丁珊瑚礁浮潛體驗", region: "屏東", category: "戶外冒險", duration: "半天", price: 1650, rating: 4.5, reviews: 234, img: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=500" },
            { id: 12, title: "台北茶道文化靜心體驗", region: "台北", category: "文化歷史", duration: "2小時", price: 1200, rating: 4.5, reviews: 196, img: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500" }
        ];

        // 當前選取的篩選狀態物件 (State)
        let currentFilters = {
            regions: [],
            categories: [],
            durations: [],
            minPrice: null,
            maxPrice: null,
            sortBy: 'default'
        };

        document.addEventListener("DOMContentLoaded", () => {
            initDOMEvents();
            renderProducts(SAMPLE_PRODUCTS);
        });

        // 綁定所有的 DOM 監聽事件
        function initDOMEvents() {
            // 標籤類點擊事件（地區、分類、時間）
            setupTagFilter('#it-filter-region', 'regions');
            setupTagFilter('#it-filter-category', 'categories');
            setupTagFilter('#it-filter-duration', 'durations');

            // 價格區間輸入事件
            const minPriceInput = document.getElementById('it-price-min');
            const maxPriceInput = document.getElementById('it-price-max');

            minPriceInput.addEventListener('input', (e) => {
                currentFilters.minPrice = e.target.value ? Number(e.target.value) : null;
                applyFiltersAndSort();
            });
            maxPriceInput.addEventListener('input', (e) => {
                currentFilters.maxPrice = e.target.value ? Number(e.target.value) : null;
                applyFiltersAndSort();
            });

            // 排序下拉選單事件
            const sortSelect = document.getElementById('it-sort-select');
            sortSelect.addEventListener('change', (e) => {
                currentFilters.sortBy = e.target.value;
                applyFiltersAndSort();
            });

            // 清除全部按鈕
            const clearAllBtn = document.getElementById('it-clear-all');
            clearAllBtn.addEventListener('click', () => {
                // 重設狀態
                currentFilters = { regions: [], categories: [], durations: [], minPrice: null, maxPrice: null, sortBy: 'default' };

                // 清除畫面上所有按鈕的 active 樣式
                document.querySelectorAll('.it-tag-btn').forEach(btn => btn.classList.remove('is-active'));

                // 清空輸入框與還原下拉選單
                minPriceInput.value = '';
                maxPriceInput.value = '';
                sortSelect.value = 'default';

                applyFiltersAndSort();
            });

            const productsGrid = document.getElementById('it-products-grid');

            productsGrid.addEventListener('click', (e) => {
                // 1. 檢查點擊的目標是否為愛心按鈕，或者是其子元素
                const heartBtn = e.target.closest('.it-heart-btn');
                if (!heartBtn) return;

                // 2. [核心變更]：直接切換 'is-active' 類別。
                heartBtn.classList.toggle('is-active');

                // 個人頁面對接註解：
                // 獲取商品 ID (從父層卡片中)
                const productCard = heartBtn.closest('.it-product-card');
                const productId = productCard.getAttribute('data-id');
                const productTitle = productCard.querySelector('.it-card-title').textContent;

                // 判斷目前狀態（已收藏或已移除）
                const isCollected = heartBtn.classList.contains('is-active');

                // 這裡是加入未來正式邏輯的地方：
                if (isCollected) {
                    // 這裡要呼叫後端 API，將 productId 加入此用戶的收藏名單中
                    console.log(`[開發端回饋] 已將商品 "${productTitle}" (ID: ${productId}) 「暫時」加入收藏清單`);

                    // 未來範例: api.addFavorite(userId, productId).then(() => { /* 同步成功 */ });
                } else {
                    // 這裡要呼叫後端 API，將 productId 從此用戶的收藏名單中移除
                    console.log(`[開發端回饋] 已將商品 "${productTitle}" (ID: ${productId}) 「暫時」從收藏清單移除`);

                    // 未來範例: api.removeFavorite(userId, productId).then(() => { /* 同步成功 */ });
                }
            });
        }

        // 輔助函式：處理多選 Tag 切換邏輯
        function setupTagFilter(containerSelector, filterKey) {
            const container = document.querySelector(containerSelector);
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('.it-tag-btn');
                if (!btn) return;

                const value = btn.getAttribute('data-value');
                btn.classList.toggle('is-active');

                if (btn.classList.contains('is-active')) {
                    currentFilters[filterKey].push(value);
                } else {
                    currentFilters[filterKey] = currentFilters[filterKey].filter(item => item !== value);
                }
                applyFiltersAndSort();
            });
        }

        // 核心邏輯：過濾與排序演算法
        function applyFiltersAndSort() {
            let result = [...SAMPLE_PRODUCTS];

            // 地區過濾 (多選，若無勾選則視為全選)
            if (currentFilters.regions.length > 0) {
                result = result.filter(p => currentFilters.regions.includes(p.region));
            }

            // 分類過濾 (多選)
            if (currentFilters.categories.length > 0) {
                result = result.filter(p => currentFilters.categories.includes(p.category));
            }

            // 時間長度過濾 (多選)
            if (currentFilters.durations.length > 0) {
                result = result.filter(p => currentFilters.durations.includes(p.duration));
            }

            // 最低價格限制
            if (currentFilters.minPrice !== null) {
                result = result.filter(p => p.price >= currentFilters.minPrice);
            }

            // 最高價格限制
            if (currentFilters.maxPrice !== null) {
                result = result.filter(p => p.price <= currentFilters.maxPrice);
            }

            // 執行排序
            if (currentFilters.sortBy === 'price-asc') {
                result.sort((a, b) => a.price - b.price);
            } else if (currentFilters.sortBy === 'price-desc') {
                result.sort((a, b) => b.price - a.price);
            } else if (currentFilters.sortBy === 'rating-desc') {
                result.sort((a, b) => b.rating - a.rating);
            } else if (currentFilters.sortBy === 'reviews-desc') {
                result.sort((a, b) => b.reviews - a.reviews);
            }

            // 更新畫面上計算出來的總數與渲染卡片
            document.getElementById('it-total-count').textContent = `共找到 ${result.length} 個體驗`;
            renderProducts(result);
        }

        // 將資料轉換為 HTML 結構並渲染至頁面
        function renderProducts(products) {
            const grid = document.getElementById('it-products-grid');

            if (products.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px 0;">沒有符合條件的體驗，請重新篩選</div>`;
                return;
            }

            grid.innerHTML = products.map(product => `
    <article class="it-product-card" data-id="${product.id}">
      <div class="it-card-image-wrapper">
        <img class="it-card-img" src="${product.img}" alt="${product.title}" loading="lazy">
        <button type="button" class="it-heart-btn" aria-label="收藏">❤</button>
      </div>
      <div class="it-card-content">
        <span class="it-card-tag">${product.category}</span>
        <h4 class="it-card-title">${product.title}</h4>
        <div class="it-card-meta">
          <span>📍 ${product.region}</span>
          <span>⏱ ${product.duration}</span>
        </div>
        <div class="it-card-footer">
          <div class="it-card-price">NT$ ${product.price.toLocaleString()} <span>/ 人起</span></div>
          <div class="it-card-rating">
            ★ ${product.rating.toFixed(1)} <span class="it-card-reviews">(${product.reviews})</span>
          </div>
        </div>
      </div>
    </article>
  `).join('');
        }
    </script>
</body>

</html>
