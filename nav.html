<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>島嶼旅跡 IslandTrace</title>
    <style>
        /* 初始化與變數定義 */
:root {
    --nav-bg: #1a2649;
    --brand-orange: #e66f43;
    --text-white: #ffffff;
    --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    --transition-smooth: all 0.25s ease;
    --footer-bg: #1a2649;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 利用 Flexbox 讓 Body 具備全高，以達到 Footer 永遠置底 */
html, body {
    height: 100%;
}

body {
    font-family: var(--font-main);
    background-color: #f8f9fa;
    display: flex;
    flex-direction: column;
}

a {
    text-decoration: none;
    color: inherit;
}

/* 當頁面內容不足時，此區塊會彈性撐滿剩餘空間，進而將 footer 完美推至底部 */
.main-content {
    flex: 1 0 auto;
}

/* Header & Navigation 樣式 */
.main-header {
    background-color: var(--nav-bg);
    width: 100%;
    box-shadow: 0 4px 12px #0000001a;
    flex-shrink: 0;
}

.nav-container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo-wrapper {
    display: flex;
    align-items: center;
    gap: 4px;
}

.logo-text {
    color: var(--text-white);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.nav-menu {
    display: flex;
    align-items: center;
    list-style: none;
    gap: 32px;
}

.nav-link {
    color: var(--text-white);
    font-size: 1rem;
    font-weight: 500;
    opacity: 0.9;
    transition: var(--transition-smooth);
}

.nav-link:hover {
    opacity: 1;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

.btn-cta {
    background-color: var(--brand-orange);
    color: var(--text-white);
    padding: 10px 24px;
    border-radius: 50px;
    font-weight: 500;
    font-size: 1rem;
    transition: var(--transition-smooth);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(230, 111, 67, 0.2);
}

.btn-cta:hover {
    background-color: #df5d2f;
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(230, 111, 67, 0.3);
}

.btn-cta:active {
    transform: translateY(0);
}

/* Footer */
.main-footer {
    background-color: var(--footer-bg);
    color: var(--text-white);
    padding: 60px 0 30px;
    width: 100%;
    flex-shrink: 0; /* 防止頁尾被壓縮 */
}

.main-footer .container-normal {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.main-footer .footer-main {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 40px;
    padding-bottom: 40px;
}

.main-footer .footer-brand {
    flex: 2;
}

.main-footer .footer-menu {
    flex: 3;
    display: flex;
    justify-content: space-between;
    gap: 20px;
}

/* 左 */
.main-footer .footer-logo {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
}

.main-footer .footer-logo .dot {
    color: var(--brand-orange);
}

.main-footer .brand-desc {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.8);
}

/* 右 */
.main-footer .menu-group {
    list-style: none;
    min-width: 100px;
    flex-wrap: wrap;
}

.main-footer .menu-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 20px;
}

.main-footer .menu-group li {
    margin-bottom: 15px;
}

.main-footer .menu-item {
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    transition: color 0.2s ease;
}

.main-footer .menu-item:hover {
    color: var(--text-white);
}

/* 分隔線與版權區 */
.main-footer .footer-divider {
    border: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 20px;
}

.main-footer .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
}

.main-footer .slogan {
    letter-spacing: 1px;
}

/* RWD 響應式優化（納入所有追加部分）*/
@media (max-width: 992px) {
    .nav-container {
        padding: 16px 24px;
    }

    .nav-menu {
        gap: 20px;
    }

    /* 平板裝置降低間距，調整寬度佔比 */
    .main-footer .footer-main {
        gap: 30px;
    }
}

@media (max-width: 768px) {
    /* Navbar 行動端優化 */
    .nav-menu {
       display: none;
    }
    
    .btn-cta {
        padding: 8px 16px;
        font-size: 0.9rem;
    }




    /* Footer 行動端優化：打破 2:3 與橫向排列，全部改為垂直向下延展 */
    .main-footer .footer-main {
        flex-direction: column;
        gap: 40px;
    }

    .main-footer .footer-brand,
    .main-footer .footer-menu {
        flex: none;
        width: 100%;
    }

    /* 選單改為流式並列或視螢幕大小落行 */
    .main-footer .footer-menu {
        flex-wrap: wrap;
        gap: 30px;
        justify-content: flex-start;
    }

    .main-footer .menu-group {
        flex: 1 1 120px; /* 寬度不足時會自動往下推 */
    }

    /* 版權宣告改為垂直排列 */
    .main-footer .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}
    </style>
</head>

                    <ul class="menu-group">
