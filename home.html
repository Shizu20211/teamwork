<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

* {
    box-sizing: border-box;
    margin: 0;
}
:root {
  --it-primary-color: #e25c38;
  --it-primary-light: #fff3f0;
  --it-primary-hover: #cc4f2e;
  --it-text-dark: #333333;
  --it-text-muted: #666666;
  --it-navy-bg: #1a2b3c;            /* 宣告區藏青色背景 */
  --it-border-color: #e0e0e0;
  --it-radius-lg: 24px;
  --it-radius-md: 16px;
  --it-radius-sm: 12px;
  --it-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.it-home-wrapper {
  width: 100%;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  box-sizing: border-box;
}

.it-home-wrapper * { box-sizing: border-box; }

/* 通用標題樣式 */
.it-section-subtitle {
  color: var(--it-text-muted);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 8px;
}
.it-section-title {
  font-size: 2rem;
  font-weight: 700;
  color: var(--it-text-dark);
  margin: 0;
}

/* --------------------------------------------------------------------------
   1. Hero 滿版導入區
   -------------------------------------------------------------------------- */
.it-hero-section {
  width: 100%;
  min-height: 600px;
  background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)), 
              url('https://image.asoview-media.com/image/production/note/article/b858199b-79d2-4116-b07d-a2d48e5bdfbd.jpg') no-repeat center center;
  background-size: cover;
  background-position: 0px 0px;
  display: flex;
  align-items: center;
  justify-content: left;
  padding: 100px 40px;
  text-align: center;
}
.it-hero-content { max-width: 800px; width: 100%; }
.it-hero-subtitle { color: var(--it-primary-color); font-weight: 700; letter-spacing: 3px; font-size: 1rem; text-align: left; display: block; margin-bottom: 16px; }
.it-hero-title { color: #ffffff; font-size: 3.5rem; font-weight: 700; margin: 0 0 24px 0; line-height: 1.25; text-align: left; text-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.it-hero-title .it-highlight { color: var(--it-primary-color); }
.it-hero-desc { color: rgba(255, 255, 255, 0.95); font-size: 1.2rem; text-align: left; margin: 0 0 48px 0; line-height: 1.6; text-shadow: 0 1px 6px rgba(0,0,0,0.3); }

/* 搜尋欄卡片 */
.it-search-bar-card {
  background: #ffffff;
  border-radius: 44px;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  max-width: 760px;
  margin: 0 auto;
  gap: 20px;
  text-align: left;
}
.it-search-field { flex: 1; display: flex; flex-direction: column; }
.it-field-label { font-size: 0.85rem; color: var(--it-text-muted); font-weight: 600; margin-bottom: 6px; }
.it-home-select, .it-home-date-input { border: none; background: transparent; font-size: 1rem; color: var(--it-text-dark); font-weight: 500; outline: none; width: 100%; padding: 4px 0; cursor: pointer; }
.it-search-divider { width: 1px; height: 44px; background-color: var(--it-border-color); }
.it-btn-search { background-color: var(--it-primary-color); color: #ffffff; border: none; border-radius: var(--it-radius-lg); padding: 14px 36px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.it-btn-search:hover { background-color: var(--it-primary-hover); }

/* 廣告數據統計區 */
.it-stats-bar { background-color: #fdf5ea; border-bottom: 1px solid #f0f0f0; padding: 36px 20px; }
.it-stats-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; gap: 20px; }
.it-stat-item { display: flex; flex-direction: column; gap: 4px; }
.it-stat-num { font-size: 2rem; font-weight: 700; color: var(--it-navy-bg); }
.highlight { color: #ff4b2b; /* 2色目の色 */}
.it-stat-text { font-size: 0.9rem; color: var(--it-text-muted); font-weight: 500; }

/* --------------------------------------------------------------------------
   3. 尋找體驗類型區塊 (符合：電腦版圖上字下、Hover變橘/淺橘底)
   -------------------------------------------------------------------------- */
.it-theme-section { max-width: 1200px; margin: 80px auto; padding: 0 20px; text-align: center; }
.it-theme-section .it-section-title { margin-bottom: 40px; }
.it-theme-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px; }

.it-theme-btn {
  background-color: #f9f9f9;
  border: 2px solid transparent;
  border-radius: var(--it-radius-md);
  padding: 24px 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column; /* 圖上字下核心佈局 */
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.25s ease;
}
.it-theme-emoji { font-size: 2rem; display: block; } /* 圖片為主 */
.it-theme-text { font-size: 0.95rem; color: var(--it-text-dark); font-weight: 600; } /* 文字為輔 */

/* Hover 變邊框橘色、底色淺橘 */
.it-theme-btn:hover, .it-theme-btn.is-active {
  border-color: var(--it-primary-color);
  background-color: var(--it-primary-light);
}
.it-theme-btn:hover .it-theme-text, .it-theme-btn.is-active .it-theme-text {
  color: var(--it-primary-color);
}

/* --------------------------------------------------------------------------
   4. 本週熱門體驗區塊 (2列4欄共8張網格)
   -------------------------------------------------------------------------- */
.it-trending-section { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
.it-section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; }
.it-view-all-link { color: var(--it-primary-color); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
.it-view-all-link:hover { text-decoration: underline; }

.it-trending-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4欄 */
  gap: 24px;
}

/* 複用先前的高級卡片樣式 */
.it-product-card { background: #ffffff; border: 1px solid var(--it-border-color); border-radius: 12px; overflow: hidden; position: relative; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
.it-product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0,0,0,0.08); }
.it-card-image-wrapper { position: relative; padding-top: 66.66%; background: #eee; }
.it-card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
.it-heart-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: all 0.2s; color: #888; z-index: 2; }
.it-heart-btn.is-active { color: var(--it-primary-color); background: #fff; box-shadow: 0 2px 10px rgba(226,92,56,0.3); }
.it-heart-btn:active { transform: scale(0.85); }
.it-card-content { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; }
.it-card-tag { font-size: 0.75rem; color: var(--it-primary-color); font-weight: bold; margin-bottom: 6px; }
.it-card-title { font-size: 1rem; color: var(--it-text-dark); margin: 0 0 8px 0; font-weight: 600; line-height: 1.4; }
.it-card-meta { font-size: 0.8rem; color: var(--it-text-muted); margin-bottom: 12px; display: flex; gap: 10px; }
.it-card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #f5f5f5; padding-top: 12px; }
.it-card-price { font-size: 1.1rem; color: var(--it-text-dark); font-weight: bold; }
.it-card-price span { font-size: 0.8rem; color: var(--it-text-muted); }
.it-card-rating { font-size: 0.85rem; color: #ffa800; }
.it-card-reviews { color: var(--it-text-muted); font-size: 0.8rem; }

/* --------------------------------------------------------------------------
   5. 在地嚮導宣告區塊 (高約 300px 藏青色背景)
   -------------------------------------------------------------------------- */
.it-guide-banner {
  width: 100%;
  min-height: 300px; /* 改為最小高度，避免內文擠壓變形 */
  background-color: var(--it-navy-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px; /* 增加上下 padding，RWD 時更安全 */
}

/* 核心更動：將內容容器改為 Flex，讓文案與按鈕左右排列 */
.it-guide-banner-content {
  max-width: 1100px; /* 放大最大寬度，給予左右排版足夠的拉伸空間 */
  width: 100%;
  display: flex;
  justify-content: space-between; /* 讓文案靠左、按鈕靠右 */
  align-items: center;            /* 關鍵：讓右側按鈕在垂直方向上置中 */
  gap: 40px;                      /* 避免左右貼太近 */
}

/* 文案包裝層 (確保寬度足夠) */
.it-guide-text-group {
  flex: 1;
  max-width: 650px; /* 限制文案最大寬度，維持良好的閱讀動線 */
}

.it-guide-title { 
  color: #ffffff; 
  font-size: 1.8rem; 
  margin: 0 0 14px 0; 
  font-weight: 700; 
  text-align: left; 
  line-height: 1.4; 
}

.it-guide-desc { 
  color: rgba(255,255,255,0.8); 
  font-size: 0.95rem; 
  margin: 0; /* 移除原本的 bottom margin，因為現在改為左右排版 */
  line-height: 1.6; 
  text-align: left; 
}

/* 右側按鈕群組 */
.it-guide-actions { 
  display: flex; 
  justify-content: flex-end; /* 在電腦版讓按鈕靠右齊 */
  align-items: center;
  gap: 16px; 
  flex-shrink: 0; /* 防止按鈕寬度被擠壓變形 */
}

.it-btn-guide-orange { background-color: var(--it-primary-color); color: #ffffff; border: none; padding: 12px 28px; border-radius: var(--it-radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.it-btn-guide-orange:hover { background-color: var(--it-primary-hover); }

.it-btn-guide-white { background-color: #ffffff; color: var(--it-navy-bg); border: 1px solid #ffffff; padding: 12px 28px; border-radius: var(--it-radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.it-btn-guide-white:hover { background-color: transparent; color: #ffffff; }

/* ==========================================================================
   RWD 響應式優化 (當螢幕變小時自動回復上下堆疊，才不會變得很擠)
   ========================================================================== */
@media (max-width: 768px) {
  .it-guide-banner-content {
    flex-direction: column; /* 手機板切換為上下排列 */
    text-align: center;
    gap: 24px;
  }
  
  .it-guide-text-group {
    max-width: 100%;
  }
  
  .it-guide-title, .it-guide-desc {
    text-align: center; /* 手機板文字置中較美觀 */
  }
  
  .it-guide-actions {
    flex-direction: column; /* 手機板按鈕上下疊起來 */
    width: 100%;
    justify-content: center;
  }
  
  .it-btn-guide-orange, .it-btn-guide-white {
    width: 100%; /* 手機板按鈕滿版 */
    text-align: center;
  }
}
/* 旅客回饋 */
.it-reviews-section { max-width: 1200px; margin: 80px auto; padding: 0 20px; text-align: center; }
.it-reviews-section .it-section-title { margin-bottom: 40px; }
.it-reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; text-align: left; }

.it-review-card { background: #ffffff; border: 1px solid var(--it-border-color); border-radius: var(--it-radius-md); padding: 24px; box-shadow: var(--it-shadow); display: flex; flex-direction: column; justify-content: space-between; }
.it-review-stars { color: #ffa800; font-size: 1.1rem; margin-bottom: 12px; }
.it-review-comment { font-size: 0.95rem; color: var(--it-text-dark); line-height: 1.6; font-style: italic; margin: 0 0 20px 0; flex-grow: 1; }
.it-review-user { display: flex; align-items: center; gap: 12px; border-top: 1px solid #f5f5f5; padding-top: 14px; }
.it-user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #ddd; }
.it-user-info { display: flex; flex-direction: column; }
.it-user-name { font-size: 0.9rem; font-weight: 600; color: var(--it-text-dark); }
.it-user-meta { font-size: 0.78rem; color: var(--it-text-muted); }

/* RWD 響應式佈局破斷點控制 */
@media (max-width: 1024px) {
  .it-theme-grid { grid-template-columns: repeat(4, 1fr); } /* 縮小改4欄 */
  .it-trending-grid { grid-template-columns: repeat(2, 1fr); } /* 縮小改2列4欄 -> 4列2欄 */
  .it-reviews-grid { grid-template-columns: repeat(1, 1fr); }
}

@media (max-width: 768px) {
  .it-hero-title { font-size: 2.4rem; }
  .it-search-bar-card { flex-direction: column; padding: 20px; gap: 16px; }
  .it-search-divider { display: none; }
  .it-search-field { width: 100%; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
  .it-btn-search { width: 100%; border-radius: var(--it-radius-sm); }
  .it-stats-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .it-theme-grid { grid-template-columns: repeat(2, 1fr); }
  .it-theme-btn { padding: 16px 8px; } /* 行動端稍微縮減高度 */
  .it-guide-banner { height: auto; padding: 40px 20px; }
  .it-guide-actions { flex-direction: column; width: 100%; gap: 12px; }
  .it-btn-guide-orange, .it-btn-guide-white { width: 100%; }
}
    </style>
</head>

<div class="it-home-wrapper">

// 3. 排序並渲染前 8 張熱門卡片（依據評分降冪排列）
function renderTrendingProducts() {
  const grid = document.getElementById('it-trending-products-grid');
  
  // 核心邏輯：依照 rating (星星數) 從高到低排序，並取前 8 筆
  const topEight = [...DATASET]
    .sort((a, b) => b.rating - a.rating)
    .slice(0, 8);

  grid.innerHTML = topEight.map(p => `
    <article class="it-product-card" data-id="${p.id}">
      <div class="it-card-image-wrapper">
        <img class="it-card-img" src="${p.img}" alt="${p.title}" loading="lazy">
        <button type="button" class="it-heart-btn" aria-label="收藏">❤</button>
      </div>
      <div class="it-card-content">
        <span class="it-card-tag">${p.category}</span>
        <h4 class="it-card-title">${p.title}</h4>
        <div class="it-card-meta">
          <span>📍 ${p.region}</span>
          <span>⏱ ${p.duration}</span>
        </div>
        <div class="it-card-footer">
          <div class="it-card-price">NT$ ${p.price.toLocaleString()} <span>/ 人起</span></div>
          <div class="it-card-rating">
            ★ ${p.rating.toFixed(1)} <span class="it-card-reviews">(${p.reviews})</span>
          </div>
        </div>
      </div>
    </article>
  `).join('');
}

// 4. 渲染 3 筆旅客回饋卡片
function renderReviews() {
  const grid = document.getElementById('it-home-reviews-grid');
  grid.innerHTML = REVIEWS_MOCK.map(r => `
    <div class="it-review-card">
      <div>
        <div class="it-review-stars">${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}</div>
        <p class="it-review-comment">「${r.comment}」</p>
      </div>
      <div class="it-review-user">
        <img class="it-user-avatar" src="${r.avatar}" alt="${r.name}">
        <div class="it-user-info">
          <span class="it-user-name">${r.name}</span>
          <span class="it-user-meta">來自 ${r.origin} · ${r.date}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// 5. 事件監聽控制項
function initHomeInteractions() {
  // A. 頂部搜尋列控制
  const searchBtn = document.getElementById('it-home-search-btn');
  searchBtn.addEventListener('click', () => {
    const loc = document.getElementById('it-home-location').value;
    const date = document.getElementById('it-home-date').value;
    if (!loc) { alert("請先選擇您想去的目的地縣市唷！"); return; }
    
    console.log(`[搜尋接口] 目的地: ${loc}, 日期: ${date}`);
    alert(`【串接提示】即將進入搜尋過濾頁面...\n選擇地區：${loc}\n選擇日期：${date || '未指定'}`);
    
    // 未來串接：window.location.href = `./explore.html?region=${loc}&date=${date}`;
  });

  // B. 體驗類型點擊單選/切換樣式效果
  const themeGrid = document.getElementById('it-home-theme-grid');
  themeGrid.addEventListener('click', (e) => {
    const btn = e.target.closest('.it-theme-btn');
    if (!btn) return;
    themeGrid.querySelectorAll('.it-theme-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    console.log(`[主題接口] 已選取分類: ${btn.getAttribute('data-theme')}`);
  });

  // C. [即時功能] 熱門卡片愛心點擊紅灰變色控制 (事件委託)
  const trendingGrid = document.getElementById('it-trending-products-grid');
  trendingGrid.addEventListener('click', (e) => {
    const heartBtn = e.target.closest('.it-heart-btn');
    if (!heartBtn) return;

    // 即時切換類別：前端馬上變色
    heartBtn.classList.toggle('is-active');
    
    const card = heartBtn.closest('.it-product-card');
    const pid = card.getAttribute('data-id');
    const isFav = heartBtn.classList.contains('is-active');

    // ==========================================================
    // [個人頁面對接註解] 給未來負責「我的收藏 / 個人頁面」的工程師：
    // ==========================================================
    console.log(`[收藏同步系統] 商品 ID: ${pid}, 目前狀態是否收藏: ${isFav}`);
    // 範例：api.updateUserFavorite(pid, isFav);
  });
}
